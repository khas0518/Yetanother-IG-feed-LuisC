<!DOCTYPE html>
<html>
   <head>
        <title>IG Feed</title>
        <link rel="stylesheet" href="styles.css">
   </head>
   <body>
        <div class="ig-feed">
            <div class="feedTitle">
                <h1>Breathe Code Photo Feed</h1>
            </div>
            <div class="Post">
                <div class="Post-header">
                    <h2>Playing Softball</h2>
                    <span>06/01</span>
                </div>
                <div class="Post-image">
                    <img src="https://img.magnific.com/free-photo/view-male-baseball-player-field_23-2150982562.jpg?semt=ais_hybrid&w=740&q=80" alt="Playing Softball">
                </div>
                <div class="Post-footer">
                    <p>This is a picture of one of my best at-bats of the season</p>
                </div>
            </div>  
            <div class="Post">
                <div class="Post-header">
                    <h2>Hiking</h2>
                    <span>09/05</span>
                </div>
                <div class="Post-image">
                    <img src="https://plus.unsplash.com/premium_photo-1677002240252-af3f88114efc?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8cGVvcGxlJTIwaGlraW5nfGVufDB8fDB8fHww" alt="Hiking with friends">
                </div>
                <div class="Post-footer">
                    <p>That was one of the most beautiful landscapes I've ever seen</p>
                </div>
            </div>
            <div class="Post">
                <div class="Post-header">
                    <h2>Playtime with the Puppy</h2>
                    <span>12/12</span>
                </div>
                <div class="Post-image">
                    <img src="https://animalwellnessmagazine.com/wp-content/uploads/puppy-837998_640.jpg" alt="Puppy playing">
                </div>
                <div class="Post-footer">
                    <p>This pup is very energetic</p>
                </div>
            </div>
            <div class="Post">
                <div class="Post-header">
                    <h2>Office Time</h2>
                    <span>05/26</span>
                </div>
                <div class="Post-image">
                    <img src="https://www.ceupe.com.ve/images/easyblog_articles/250/lombo.jpg" alt="work desk">
                </div>
                <div class="Post-footer">
                    <p>Love being productive</p>
                </div>
            </div>  
        </div>
   </body>
</html>
